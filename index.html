<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japón 2026 — Itinerario</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --tokyo: #e53935;
      --kyoto: #c8880a;
      --okinawa: #0277bd;
      --osaka: #e67e00;
      --flight: #607d8b;
      --bg: #f0f2f5;
      --surface: #ffffff;
      --card: #e8ecf2;
      --border: rgba(0, 0, 0, 0.09);
      --text: #1a1a2e;
      --muted: #7878a0;
      --accent: #e53935;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      /* Dynamic viewport height on mobile (accounts for browser chrome) */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-flag {
      font-size: 1.6rem;
    }

    .header-text h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .legend {
      display: flex;
      gap: 14px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── MAIN LAYOUT ─────────────────────────── */
    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────── */
    .sidebar {
      width: 310px;
      flex-shrink: 0;
      overflow-y: auto;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .sidebar::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .city-group-label {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 16px 16px 6px;
    }

    .day-card {
      margin: 2px 8px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .day-card:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .day-card.active {
      background: rgba(0, 0, 0, 0.06);
    }

    .day-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .day-badge {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .day-title {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .day-note {
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .activity-list {
      list-style: none;
    }

    .activity-item {
      display: flex;
      align-items: baseline;
      gap: 5px;
      font-size: 0.71rem;
      color: #6060a0;
      padding: 2px 4px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .activity-item:hover {
      color: #1a1a2e;
      background: rgba(0, 0, 0, 0.05);
    }

    .activity-item.active-act {
      color: #1a1a2e;
    }

    .act-emoji {
      font-size: 0.65rem;
      flex-shrink: 0;
    }

    .act-name {
      flex: 1;
    }

    .act-star {
      color: #F9A825;
      font-size: 0.6rem;
    }

    .shop-tag {
      font-size: 0.52rem;
      padding: 1px 5px;
      border-radius: 8px;
      background: rgba(38, 166, 154, 0.15);
      color: #26A69A;
      border: 1px solid rgba(38, 166, 154, 0.35);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .activity-item.shop-item {
      color: #1a8a80;
    }

    .activity-item.shop-item:hover {
      color: #1a1a2e;
      background: rgba(38, 166, 154, 0.12);
      border-left-color: #26A69A;
    }

    /* ── MAP ─────────────────────────────────── */
    .map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ── DETAIL PANEL ────────────────────────── */
    .detail {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(16px);
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.12);
      border-top: 2px solid var(--accent);
      padding: 18px 22px 22px;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      max-height: 42%;
      overflow-y: auto;
    }

    .detail.open {
      transform: translateY(0);
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .detail-emoji {
      font-size: 1.8rem;
      line-height: 1;
    }

    .detail-titles {
      flex: 1;
    }

    .detail-name {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .detail-type {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .detail-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.1s;
    }

    .detail-close:hover {
      color: #1a1a2e;
    }

    .detail-desc {
      font-size: 0.82rem;
      line-height: 1.65;
      color: #3a3a5c;
      margin-bottom: 10px;
    }

    .detail-tips {
      font-size: 0.77rem;
      line-height: 1.55;
      background: rgba(0, 0, 0, 0.04);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 8px 12px;
      color: #505090;
    }

    .detail-tips strong {
      color: #1a1a2e;
    }

    .detail-maps-btn {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
      width: fit-content;
    }
    .detail-maps-btn:hover {
      opacity: 0.75;
      transform: translateY(-1px);
    }

    /* ── MOBILE ──────────────────────────────── */
    #mobile-tabs {
      display: none;
    }

    @media (max-width: 768px) {

      /* Simplify header */
      header {
        padding: 10px 14px;
        gap: 12px;
      }

      .header-text h1 {
        font-size: 0.88rem;
      }

      .header-text p {
        font-size: 0.65rem;
      }

      .legend {
        display: none;
      }

      /* Stack layout vertically */
      .app {
        flex-direction: column;
      }

      /* Sidebar full width */
      .sidebar {
        width: 100%;
        flex: 1;
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-y: auto;
      }

      .sidebar.tab-hidden {
        display: none;
      }

      .map-wrap.tab-hidden {
        display: none;
      }

      /* Map wrap fills remaining space */
      .map-wrap {
        flex: 1;
        min-height: 0;
      }

      /* Bigger touch targets */
      .day-card {
        padding: 11px 14px;
        margin: 2px 6px;
      }

      .activity-item {
        padding: 6px 6px;
        min-height: 34px;
        align-items: center;
      }

      /* Detail panel: fixed at bottom above tab bar */
      .detail {
        position: fixed;
        bottom: 56px;
        /* height of tab bar */
        z-index: 2000;
        max-height: 60%;
      }

      /* Mobile tab bar */
      #mobile-tabs {
        display: flex;
        background: var(--surface);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        z-index: 1500;
        height: 56px;
      }

      .tab-btn {
        flex: 1;
        padding: 0 14px;
        background: none;
        border: none;
        border-top: 3px solid transparent;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: color 0.15s, border-top-color 0.15s;
      }

      .tab-btn .tab-icon {
        font-size: 1.2rem;
        line-height: 1;
      }

      .tab-btn.active {
        color: var(--text);
        border-top-color: var(--accent);
      }
    }

    /* Custom Leaflet markers */
    .map-marker {
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid rgba(255, 255, 255, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .map-marker-inner {
      transform: rotate(45deg);
      font-size: 0.7rem;
    }

    .map-marker.pulse {
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.15);
    }
  </style>
</head>

    // ── MAP SETUP ────────────────────────────────────────────────────────────────
    const map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 36, lng: 138 },
      zoom: 5,
      disableDefaultUI: true,
      zoomControl: true,
      zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
      gestureHandling: 'greedy',
    });

    let currentDayIdx = -1;
    let markers = [];
    let activeMarker = null;

    // ── MARKER FACTORY ───────────────────────────────────────────────────────────
    function markerSVG(col, emoji) {
      return encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="46">` +
        `<path d="M18 2C9.716 2 3 8.716 3 17c0 11.314 15 27 15 27S33 28.314 33 17C33 8.716 26.284 2 18 2z" ` +
        `fill="${col}" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>` +
        `<text x="18" y="19" text-anchor="middle" dominant-baseline="middle" font-size="13">${emoji}</text>` +
        `</svg>`
      );
    }

    function shopSVG(emoji) {
      return encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26">` +
        `<rect x="2" y="2" width="22" height="22" rx="4" fill="#0d2b28" stroke="#26A69A" stroke-width="2"/>` +
        `<text x="13" y="14" text-anchor="middle" dominant-baseline="middle" font-size="12">${emoji}</text>` +
        `</svg>`
      );
    }

    function makeMarker(act, city) {
      const pos = { lat: act.lat, lng: act.lng };

      if (act.kind === 'shop') {
        const m = new google.maps.Marker({
          position: pos, map,
          icon: { url: 'data:image/svg+xml,' + shopSVG(act.e), scaledSize: new google.maps.Size(26, 26), anchor: new google.maps.Point(13, 13) },
          title: act.name,
        });
        m.addListener('click', () => showDetail(act, city));
        return m;
      }

      const col = C[city]?.color || '#888';
      const m = new google.maps.Marker({
        position: pos, map,
        icon: { url: 'data:image/svg+xml,' + markerSVG(col, act.e), scaledSize: new google.maps.Size(36, 46), anchor: new google.maps.Point(18, 46) },
        title: act.name,
      });
      m.addListener('click', () => showDetail(act, city));
      return m;
    }

    // ── RENDER SIDEBAR ───────────────────────────────────────────────────────────
    function renderSidebar() {
      const sb = document.getElementById('sidebar');
      let html = '';
      let lastCity = null;

      DAYS.forEach((day, i) => {
        const col = C[day.city]?.color || '#888';
        const label = C[day.city]?.label || day.city;

        if (day.city !== lastCity) {
          html += `<div class="city-group-label">${label}</div>`;
          lastCity = day.city;
        }

        const actsHtml = day.acts.map((a, ai) => `
      <li class="activity-item ${a.kind === 'shop' ? 'shop-item' : ''}" id="act-${i}-${ai}" onclick="onActClick(${i}, ${ai}, event)">
        <span class="act-emoji">${a.e}</span>
        <span class="act-name">${a.name}</span>
        ${a.kind === 'shop' ? '<span class="shop-tag">tienda</span>' : ''}
        ${a.stars >= 2 ? '<span class="act-star">★★</span>' : a.stars === 1 ? '<span class="act-star">★</span>' : ''}
      </li>`).join('');

        html += `
      <div class="day-card" id="day-${i}" style="border-left-color:${col}" onclick="selectDay(${i})">
        <div class="day-top">
          <span class="day-badge" style="background:${col}">${day.date} · ${day.wd}</span>
          <span class="day-title">${day.title}</span>
        </div>
        ${day.note ? `<div class="day-note">${day.note}</div>` : ''}
        ${actsHtml ? `<ul class="activity-list">${actsHtml}</ul>` : ''}
      </div>`;
      });

      sb.innerHTML = html;
    }

    // ── SELECT DAY ───────────────────────────────────────────────────────────────
    function mapVisible() {
      return !document.querySelector('.map-wrap').classList.contains('tab-hidden');
    }

    function flyToDay(day) {
      const cityConf = C[day.city];
      if (day.acts.length === 0) {
        if (cityConf) { map.panTo({ lat: cityConf.center[0], lng: cityConf.center[1] }); map.setZoom(cityConf.zoom); }
        return;
      }
      const withCoords = day.acts.filter(a => a.lat && a.lng);
      if (withCoords.length === 1) {
        map.panTo({ lat: withCoords[0].lat, lng: withCoords[0].lng });
        map.setZoom(cityConf?.zoom || 14);
      } else if (withCoords.length > 1) {
        const bounds = new google.maps.LatLngBounds();
        withCoords.forEach(a => bounds.extend({ lat: a.lat, lng: a.lng }));
        map.fitBounds(bounds, 60);
      }
    }

    function selectDay(idx) {
      // Deactivate previous
      if (currentDayIdx >= 0) {
        document.getElementById(`day-${currentDayIdx}`)?.classList.remove('active');
      }
      currentDayIdx = idx;
      document.getElementById(`day-${idx}`)?.classList.add('active');

      // Clear markers
      markers.forEach(m => m.setMap(null));
      markers = [];

      const day = DAYS[idx];
      closeDetail();

      // Add markers
      day.acts.forEach(act => {
        if (act.lat && act.lng) {
          markers.push(makeMarker(act, day.city));
        }
      });

      // Only fly if the map container is visible (avoid Leaflet errors on hidden container)
      if (mapVisible()) {
        flyToDay(day);
      }
    }

    // ── MOBILE TAB SWITCHING ─────────────────────────────────────────────────────
    let currentTab = 'list';

    function isMobile() { return window.innerWidth <= 768; }

    function switchTab(tab) {
      currentTab = tab;
      const sidebar = document.getElementById('sidebar');
      const mapWrap = document.querySelector('.map-wrap');
      const tabList = document.getElementById('tab-list');
      const tabMap = document.getElementById('tab-map');

      if (tab === 'map') {
        sidebar.classList.add('tab-hidden');
        mapWrap.classList.remove('tab-hidden');
        tabList.classList.remove('active');
        tabMap.classList.add('active');
        // Let Leaflet recalculate size, then fly to the selected day
        setTimeout(() => {
          google.maps.event.trigger(map, 'resize');
          if (currentDayIdx >= 0) flyToDay(DAYS[currentDayIdx]);
        }, 80);
      } else {
        sidebar.classList.remove('tab-hidden');
        mapWrap.classList.add('tab-hidden');
        tabList.classList.add('active');
        tabMap.classList.remove('active');
      }
    }

    // ── ACTIVITY CLICK ───────────────────────────────────────────────────────────
    function onActClick(dayIdx, actIdx, e) {
      e.stopPropagation();
      if (currentDayIdx !== dayIdx) selectDay(dayIdx);
      const act = DAYS[dayIdx].acts[actIdx];
      showDetail(act, DAYS[dayIdx].city);

      // Pan map to this activity — on mobile, switch to map tab first
      if (act.lat && act.lng) {
        if (isMobile()) {
          switchTab('map');
          setTimeout(() => { map.panTo({ lat: act.lat, lng: act.lng }); map.setZoom(16); }, 80);
        } else {
          map.panTo({ lat: act.lat, lng: act.lng }); map.setZoom(16);
        }
      }
    }

    // ── DETAIL PANEL ─────────────────────────────────────────────────────────────
    function showDetail(act, city) {
      const col = C[city]?.color || '#888';
      document.getElementById('d-emoji').textContent = act.e;
      document.getElementById('d-name').textContent = act.name;
      document.getElementById('d-type').textContent = act.type + (act.stars ? ' · ' + '★'.repeat(act.stars) + ' Must-see' : '');
      document.getElementById('d-desc').textContent = act.desc;

      const tipsEl = document.getElementById('d-tips');
      if (act.tips) {
        tipsEl.innerHTML = `<strong>💡 Consejo:</strong> ${act.tips}`;
        tipsEl.style.display = 'block';
        tipsEl.style.borderLeftColor = col;
      } else {
        tipsEl.style.display = 'none';
      }

      // Google Maps link
      const mapsBtn = document.getElementById('d-maps');
      if (act.lat && act.lng) {
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(act.name)}&query_place_id=&center=${act.lat},${act.lng}`;
        mapsBtn.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(act.name + ' ' + (act.type || ''))}@${act.lat},${act.lng}`;
        mapsBtn.style.display = 'inline-flex';
        mapsBtn.style.borderColor = col;
        mapsBtn.style.color = col;
      } else {
        mapsBtn.style.display = 'none';
      }

      document.querySelector('.detail').style.borderTopColor = col;
      document.getElementById('detail').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('detail').classList.remove('open');
    }

    // Close detail when clicking on map
    map.addListener('click', closeDetail);

    // ── INIT ─────────────────────────────────────────────────────────────────────
    renderSidebar();

    // On mobile, start in list view (map hidden)
    if (isMobile()) {
      document.querySelector('.map-wrap').classList.add('tab-hidden');
    }

    // Auto-select first real day
    selectDay(1);

    // Scroll sidebar to top
    document.getElementById('sidebar').scrollTop = 0;

  </script>
</body>

</html>
